name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release-and-tests
            enable_tsan: "OFF"
          - name: tsan-compile
            enable_tsan: "ON"
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build (Debian Bookworm toolchain)
        run: |
          docker build -f Dockerfile.build \
            --build-arg ENABLE_TSAN=${{ matrix.enable_tsan }} \
            -t surfcam-ci-${{ matrix.name }} .
